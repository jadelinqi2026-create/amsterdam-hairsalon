<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>理发店查找器 · 荷兰 & 上海</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f5f5f0; color: #222;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* 顶栏 */
    header {
      background: #1a1a2e; color: #fff;
      padding: 14px 24px; display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.3); z-index: 1000;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; white-space: nowrap; }
    header h1 span { color: #f5a623; }
    .search-bar { display: flex; gap: 8px; flex: 1; max-width: 420px; margin: 0 24px; }
    .search-bar input {
      flex: 1; padding: 8px 14px; border: none;
      border-radius: 20px; font-size: .9rem; outline: none;
    }
    .search-bar button {
      padding: 8px 18px; background: #f5a623; border: none;
      border-radius: 20px; font-weight: 600; cursor: pointer;
      color: #1a1a2e; font-size: .85rem; transition: background .2s;
    }
    .search-bar button:hover { background: #e09500; }
    .view-toggle { display: flex; gap: 6px; }
    .view-toggle button {
      padding: 7px 16px; border: 1.5px solid #fff3;
      background: transparent; color: #fff; border-radius: 16px;
      cursor: pointer; font-size: .82rem; transition: all .2s; white-space: nowrap;
    }
    .view-toggle button.active { background: #f5a623; border-color: #f5a623; color: #1a1a2e; font-weight: 700; }

    /* 筛选栏 */
    .filter-bar {
      background: #fff; padding: 10px 24px;
      display: flex; gap: 8px; align-items: center;
      flex-shrink: 0; border-bottom: 1px solid #e0e0d8;
      overflow-x: auto; z-index: 999; flex-wrap: wrap;
    }
    .filter-bar::-webkit-scrollbar { height: 3px; }
    .filter-bar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
    .filter-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .filter-group-label {
      font-size: .75rem; color: #aaa; font-weight: 600;
      text-transform: uppercase; letter-spacing: .4px; white-space: nowrap;
      padding-right: 2px;
    }
    .filter-chip {
      padding: 5px 13px; border-radius: 16px;
      border: 1.5px solid #ddd; background: #fff;
      font-size: .82rem; cursor: pointer; white-space: nowrap;
      transition: all .18s; user-select: none;
    }
    .filter-chip:hover { border-color: #1a1a2e; color: #1a1a2e; }
    .filter-chip.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
    .filter-divider { width: 1px; height: 22px; background: #e0e0d8; margin: 0 4px; flex-shrink: 0; }
    .filter-clear {
      padding: 5px 12px; border-radius: 16px;
      border: 1.5px solid #f5a623; background: #fff;
      color: #f5a623; font-size: .78rem; cursor: pointer;
      white-space: nowrap; transition: all .18s; font-weight: 600;
      display: none;
    }
    .filter-clear.visible { display: block; }
    .filter-clear:hover { background: #f5a623; color: #fff; }

    /* 主体 */
    .main { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* 列表面板 */
    .list-panel {
      width: 360px; flex-shrink: 0; overflow-y: auto;
      background: #f5f5f0; padding: 14px;
      display: flex; flex-direction: column; gap: 12px; z-index: 10;
    }
    .list-panel::-webkit-scrollbar { width: 4px; }
    .list-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    .result-count { font-size: .8rem; color: #888; padding: 2px 0 4px; }

    /* 卡片视图 */
    body.card-view .list-panel {
      width: 100%; flex-direction: row; flex-wrap: wrap;
      align-content: flex-start; padding: 20px; gap: 16px;
    }
    body.card-view .map-panel { display: none; }
    body.card-view .shop-card { width: calc(33.33% - 11px); min-width: 260px; }
    body.card-view .result-count { width: 100%; }

    /* 店铺卡片 */
    .shop-card {
      background: #fff; border-radius: 14px; padding: 15px;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.06);
      border: 2px solid transparent; transition: all .2s;
    }
    .shop-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.12); transform: translateY(-2px); }
    .shop-card.active { border-color: #f5a623; box-shadow: 0 4px 18px rgba(245,166,35,.25); }
    .shop-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 7px; }
    .shop-name { font-size: .95rem; font-weight: 700; color: #1a1a2e; line-height: 1.3; }
    .shop-badge {
      font-size: .68rem; padding: 2px 7px; border-radius: 10px;
      white-space: nowrap; margin-left: 6px; flex-shrink: 0; margin-top: 2px;
    }
    .badge-open { background: #e8f5e9; color: #2e7d32; }
    .badge-closed { background: #ffebee; color: #c62828; }
    .shop-rating { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
    .stars { color: #f5a623; font-size: .85rem; }
    .rating-num { font-weight: 700; color: #333; font-size: .88rem; }
    .review-count { font-size: .75rem; color: #888; }
    .shop-info { font-size: .78rem; color: #666; line-height: 1.8; }
    .shop-info span { margin-right: 10px; }
    .shop-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .shop-tag { font-size: .7rem; padding: 2px 7px; background: #f0f0ec; border-radius: 7px; color: #555; }
    .shop-tag-cn { background: #fff3cd; color: #856404; }
    .shop-tag-city {
      font-size: .7rem; padding: 2px 7px; border-radius: 7px;
      background: #e3f2fd; color: #1565c0; font-weight: 600;
    }

    /* 地图面板 */
    .map-panel { flex: 1; position: relative; }
    #leafletMap { width: 100%; height: 100%; }

    /* 地图标记 */
    .map-marker {
      background: #1a1a2e; color: #fff;
      border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
      width: 32px; height: 32px; display: flex; align-items: center;
      justify-content: center; box-shadow: 0 3px 10px rgba(0,0,0,.3);
      border: 2px solid #fff; cursor: pointer; transition: background .2s;
    }
    .map-marker.active-marker { background: #f5a623; }
    .map-marker span { transform: rotate(45deg); font-size: 14px; line-height: 1; }

    /* Leaflet popup */
    .leaflet-popup-content-wrapper { border-radius: 12px !important; box-shadow: 0 8px 24px rgba(0,0,0,.15) !important; padding: 0 !important; overflow: hidden; }
    .leaflet-popup-content { margin: 0 !important; width: 240px !important; }
    .popup-inner { padding: 14px 16px; }
    .popup-name { font-weight: 700; font-size: .95rem; color: #1a1a2e; margin-bottom: 4px; }
    .popup-rating { font-size: .82rem; color: #666; margin-bottom: 4px; }
    .popup-addr { font-size: .78rem; color: #888; margin-bottom: 10px; }
    .popup-btn {
      width: 100%; padding: 8px; background: #1a1a2e; color: #fff;
      border: none; border-radius: 8px; font-size: .82rem;
      cursor: pointer; font-weight: 600; transition: background .2s;
    }
    .popup-btn:hover { background: #f5a623; color: #1a1a2e; }

    /* 详情弹窗 */
    .detail-overlay {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,.55); justify-content: center;
      align-items: center; padding: 20px;
    }
    .detail-overlay.show { display: flex; }
    .detail-panel {
      background: #fff; border-radius: 20px; max-width: 680px;
      width: 100%; max-height: 88vh; overflow-y: auto; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .detail-panel::-webkit-scrollbar { width: 4px; }
    .detail-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }
    .detail-header { background: #1a1a2e; color: #fff; padding: 22px 28px 18px; border-radius: 20px 20px 0 0; }
    .detail-header h2 { font-size: 1.25rem; margin-bottom: 4px; }
    .dh-status { display: inline-block; font-size: .72rem; padding: 2px 8px; border-radius: 10px; margin-bottom: 8px; }
    .dh-open { background: #4caf50; }
    .dh-closed { background: #ef5350; }
    .detail-header .meta { font-size: .82rem; color: #99a; display: flex; flex-wrap: wrap; gap: 8px 16px; margin-top: 6px; }
    .close-btn {
      position: absolute; top: 14px; right: 18px;
      background: rgba(255,255,255,.15); border: none; color: #fff;
      width: 30px; height: 30px; border-radius: 50%; font-size: 1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .close-btn:hover { background: rgba(255,255,255,.3); }
    .detail-body { padding: 22px 28px; }
    .tab-nav { display: flex; border-bottom: 2px solid #f0f0ec; margin-bottom: 18px; }
    .tab-btn {
      padding: 9px 18px; background: none; border: none; font-size: .88rem;
      cursor: pointer; color: #999; border-bottom: 2px solid transparent;
      margin-bottom: -2px; font-weight: 500; transition: all .2s;
    }
    .tab-btn.active { color: #1a1a2e; border-bottom-color: #f5a623; font-weight: 700; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .review-section { margin-bottom: 22px; }
    .review-section h3 { font-size: .85rem; font-weight: 700; margin-bottom: 10px; }
    .badge-good { color: #2e7d32; }
    .badge-bad { color: #c62828; }
    .review-card { background: #f9f9f6; border-radius: 11px; padding: 12px 15px; margin-bottom: 9px; border-left: 3px solid #ddd; }
    .review-card.good { border-left-color: #81c784; }
    .review-card.bad { border-left-color: #e57373; }
    .review-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
    .reviewer { font-weight: 600; font-size: .83rem; }
    .review-date { font-size: .74rem; color: #aaa; }
    .review-stars { font-size: .78rem; margin-bottom: 5px; }
    .review-text { font-size: .83rem; color: #444; line-height: 1.65; }
    .review-source { font-size: .7rem; color: #bbb; margin-top: 5px; }
    .price-table { width: 100%; border-collapse: collapse; font-size: .86rem; }
    .price-table th { text-align: left; padding: 9px 12px; background: #f0f0ec; color: #666; font-size: .78rem; font-weight: 600; }
    .price-table td { padding: 10px 12px; border-bottom: 1px solid #f0f0ec; }
    .price-table tr:last-child td { border-bottom: none; }
    .price-table tr:hover td { background: #fafaf7; }
    .price { font-weight: 700; color: #1a1a2e; }
    .price-note { font-size: .74rem; color: #999; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-label { font-size: .72rem; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
    .info-value { font-size: .85rem; color: #333; }

    /* 无结果 */
    .no-result { text-align: center; padding: 40px 20px; color: #aaa; font-size: .88rem; line-height: 2; }

    @media (max-width: 900px) {
      body.card-view .shop-card { width: calc(50% - 8px); }
      body.map-view .list-panel { width: 300px; }
    }
    @media (max-width: 640px) {
      header { flex-wrap: wrap; gap: 8px; padding: 10px 14px; }
      .search-bar { max-width: 100%; margin: 0; order: 3; flex: 0 0 100%; }
      body.map-view .main { flex-direction: column; }
      body.map-view .list-panel { width: 100%; height: 220px; flex-direction: row; flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden; padding: 10px; }
      .map-panel { min-height: 320px; }
      .detail-body { padding: 16px 18px; }
      .info-grid { grid-template-columns: 1fr; }
      body.card-view .shop-card { width: 100%; }
    }
  </style>
</head>
<body class="map-view">

<header>
  <h1>✂️ <span>理发店</span>查找器</h1>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜索店名、城市、服务…" />
    <button onclick="doSearch()">搜索</button>
  </div>
  <div class="view-toggle">
    <button class="active" id="btnMap" onclick="switchView('map')">🗺️ 地图</button>
    <button id="btnCard" onclick="switchView('card')">🃏 卡片</button>
  </div>
</header>

<div class="filter-bar">
  <!-- 城市 -->
  <div class="filter-group">
    <span class="filter-group-label">城市</span>
    <div class="filter-chip" onclick="toggleFilter(this,'city','shanghai')">🇨🇳 上海</div>
    <div class="filter-chip" onclick="toggleFilter(this,'city','amsterdam')">🇳🇱 阿姆斯特丹</div>
    <div class="filter-chip" onclick="toggleFilter(this,'city','rotterdam')">鹿特丹</div>
    <div class="filter-chip" onclick="toggleFilter(this,'city','hague')">海牙</div>
    <div class="filter-chip" onclick="toggleFilter(this,'city','utrecht')">乌特勒支</div>
    <div class="filter-chip" onclick="toggleFilter(this,'city','eindhoven')">埃因霍温</div>
    <div class="filter-chip" onclick="toggleFilter(this,'city','groningen')">格罗宁根</div>
  </div>
  <div class="filter-divider"></div>
  <!-- 剪发 -->
  <div class="filter-group">
    <span class="filter-group-label">剪发</span>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','men')">🪒 男士剪</div>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','women')">💇 女士剪</div>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','kids')">🧒 儿童剪</div>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','barber')">✂️ 剃发造型</div>
  </div>
  <div class="filter-divider"></div>
  <!-- 染发 -->
  <div class="filter-group">
    <span class="filter-group-label">染发</span>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','single-color')">单色染</div>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','highlight')">挑染</div>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','ear-dye')">挂耳染</div>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','balayage')">渐变色</div>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','bleach')">漂白脱色</div>
  </div>
  <div class="filter-divider"></div>
  <!-- 烫发 -->
  <div class="filter-group">
    <span class="filter-group-label">烫发</span>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','straight')">拉直</div>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','perm')">烫卷</div>
    <div class="filter-chip" onclick="toggleFilter(this,'svc','digital-perm')">数字烫</div>
  </div>
  <div class="filter-divider"></div>
  <!-- 其他 -->
  <div class="filter-group">
    <span class="filter-group-label">筛选</span>
    <div class="filter-chip" onclick="toggleFilter(this,'other','chinese')">🇨🇳 中文服务</div>
    <div class="filter-chip" onclick="toggleFilter(this,'other','open')">🟢 营业中</div>
    <div class="filter-chip" onclick="toggleFilter(this,'other','high')">⭐ 4.5+</div>
  </div>
  <div class="filter-divider"></div>
  <button class="filter-clear" id="filterClear" onclick="clearAllFilters()">✕ 清除</button>
</div>

<div class="main">
  <div class="list-panel" id="listPanel">
    <div class="result-count" id="resultCount">加载中…</div>
  </div>
  <div class="map-panel" id="mapPanel">
    <div id="leafletMap"></div>
  </div>
</div>

<!-- 详情弹窗 -->
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-panel">
    <button class="close-btn" onclick="closeDetail()">✕</button>
    <div class="detail-header">
      <h2 id="dp-name"></h2>
      <span class="dh-status" id="dp-status"></span>
      <div class="meta">
        <span id="dp-rating"></span>
        <span id="dp-address"></span>
        <span id="dp-phone"></span>
        <span id="dp-hours"></span>
      </div>
    </div>
    <div class="detail-body">
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('reviews')">💬 评价</button>
        <button class="tab-btn" onclick="switchTab('userreviews')">✏️ 用户评价</button>
        <button class="tab-btn" onclick="switchTab('prices')">💰 价目表</button>
        <button class="tab-btn" onclick="switchTab('info')">ℹ️ 详细信息</button>
      </div>
      <div class="tab-content active" id="tab-reviews">
        <div class="review-section">
          <h3>👍 <span class="badge-good">最近好评（3条）</span></h3>
          <div id="good-reviews"></div>
        </div>
        <div class="review-section">
          <h3>👎 <span class="badge-bad">差评（3条）</span></h3>
          <div id="bad-reviews"></div>
        </div>
      </div>
      <div class="tab-content" id="tab-userreviews">
        <div id="user-reviews-list" style="margin-bottom:18px"></div>
        <div style="background:#f9f9f6;border-radius:12px;padding:16px">
          <div style="font-size:.85rem;font-weight:700;margin-bottom:12px;color:#1a1a2e">✏️ 写评价</div>
          <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
            <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px">
              <label style="font-size:.72rem;color:#aaa;font-weight:600">评分</label>
              <select id="rv-rating" style="padding:7px 10px;border:1.5px solid #e0e0d8;border-radius:8px;font-size:.85rem">
                <option value="5">⭐⭐⭐⭐⭐ 5分</option>
                <option value="4">⭐⭐⭐⭐ 4分</option>
                <option value="3">⭐⭐⭐ 3分</option>
                <option value="2">⭐⭐ 2分</option>
                <option value="1">⭐ 1分</option>
              </select>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px">
              <label style="font-size:.72rem;color:#aaa;font-weight:600">昵称（选填）</label>
              <input id="rv-nick" type="text" placeholder="匿名用户" style="padding:7px 10px;border:1.5px solid #e0e0d8;border-radius:8px;font-size:.85rem;outline:none"/>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px">
              <label style="font-size:.72rem;color:#aaa;font-weight:600">服务项目（选填）</label>
              <input id="rv-service" type="text" placeholder="如：挑染、女士剪发…" style="padding:7px 10px;border:1.5px solid #e0e0d8;border-radius:8px;font-size:.85rem;outline:none"/>
            </div>
          </div>
          <textarea id="rv-text" placeholder="分享你的真实体验…" style="width:100%;padding:10px;border:1.5px solid #e0e0d8;border-radius:8px;font-size:.85rem;height:80px;resize:vertical;outline:none;font-family:inherit"></textarea>
          <button id="rv-submit" onclick="submitReview(currentShop.id, currentShop.name, currentShop.cityLabel)" style="margin-top:10px;padding:9px 22px;background:#1a1a2e;color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer">提交评价</button>
        </div>
      </div>
      <div class="tab-content" id="tab-prices">
        <table class="price-table">
          <thead><tr><th>服务项目</th><th>价格</th><th>备注</th></tr></thead>
          <tbody id="price-tbody"></tbody>
        </table>
      </div>
      <div class="tab-content" id="tab-info">
        <div class="info-grid" id="info-grid"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// Google Sheets 评价接口
// ============================================================
const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzG3xaDH0CjvZpcKgBC058iB9P40o3nKHR1-Rgs6CUvOMnpIXMYsU_G__v4XPklIBEd/exec';
let userReviews = {}; // { shopId: [{...}] }

async function loadUserReviews() {
  try {
    const res = await fetch(SHEETS_URL);
    const rows = await res.json();
    rows.forEach(r => {
      const id = parseInt(r['店铺ID']);
      if (!userReviews[id]) userReviews[id] = [];
      userReviews[id].push(r);
    });
  } catch(e) { console.warn('评价加载失败', e); }
}

async function submitReview(shopId, shopName, city) {
  const rating  = document.getElementById('rv-rating').value;
  const text    = document.getElementById('rv-text').value.trim();
  const nick    = document.getElementById('rv-nick').value.trim() || '匿名用户';
  const svc     = document.getElementById('rv-service').value.trim();
  if (!text) { alert('请填写评价内容'); return; }
  const btn = document.getElementById('rv-submit');
  btn.disabled = true; btn.textContent = '提交中…';
  try {
    await fetch(SHEETS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({shopId, shopName, city, rating, text, nickname: nick, service: svc})
    });
    // no-cors 无法读响应，默认成功
    if (!userReviews[shopId]) userReviews[shopId] = [];
    const today = new Date().toLocaleDateString('zh-CN');
    userReviews[shopId].push({'店铺ID':shopId,'店铺名称':shopName,'评分':rating,'评价内容':text,'评价日期':today,'城市':city,'用户昵称':nick,'服务项目':svc});
    renderUserReviews(shopId);
    document.getElementById('rv-text').value = '';
    document.getElementById('rv-nick').value = '';
    btn.textContent = '✅ 提交成功！';
    setTimeout(() => { btn.disabled=false; btn.textContent='提交评价'; }, 2000);
  } catch(e) {
    btn.disabled=false; btn.textContent='提交评价';
    alert('提交失败，请稍后再试');
  }
}

function renderUserReviews(shopId) {
  const el = document.getElementById('user-reviews-list');
  if (!el) return;
  const reviews = (userReviews[shopId] || []).slice().reverse();
  if (reviews.length === 0) {
    el.innerHTML = '<div style="color:#aaa;font-size:.82rem;padding:12px 0;">暂无用户评价，成为第一个评价的人！</div>';
    return;
  }
  el.innerHTML = reviews.map(r => `
    <div class="review-card good" style="border-left-color:#f5a623">
      <div class="review-meta">
        <span class="reviewer">${r['用户昵称'] || '匿名用户'}${r['服务项目'] ? ' · '+r['服务项目'] : ''}</span>
        <span class="review-date">${r['评价日期'] || ''}</span>
      </div>
      <div class="review-stars">${'⭐'.repeat(parseInt(r['评分'])||5)}</div>
      <div class="review-text">${r['评价内容']}</div>
    </div>
  `).join('');
}

// ============================================================
// 多选筛选状态
// ============================================================
const activeFilters = { city: new Set(), svc: new Set(), other: new Set() };
let currentSearch = '';
let currentShop = null;
let leafletMap = null;
const markers = {};

// 城市中心坐标
const CITY_CENTERS = {
  shanghai:   [31.2304, 121.4737],
  amsterdam:  [52.3676, 4.9041],
  rotterdam:  [51.9225, 4.4792],
  hague:      [52.0764, 4.3144],
  utrecht:    [52.0907, 5.1214],
  eindhoven:  [51.4416, 5.4697],
  groningen:  [53.2194, 6.5665],
};

function toggleFilter(el, group, value) {
  const set = activeFilters[group];
  if (set.has(value)) { set.delete(value); el.classList.remove('active'); }
  else { set.add(value); el.classList.add('active'); }
  updateClearBtn();
  renderCards(getFiltered());
}

function updateClearBtn() {
  const hasAny = activeFilters.city.size > 0 || activeFilters.svc.size > 0 || activeFilters.other.size > 0;
  document.getElementById('filterClear').classList.toggle('visible', hasAny);
}

function clearAllFilters() {
  activeFilters.city.clear(); activeFilters.svc.clear(); activeFilters.other.clear();
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  updateClearBtn();
  renderCards(getFiltered());
}

// ============================================================
// 筛选逻辑
// ============================================================
function getFiltered() {
  let shops = [...SHOPS];

  // 搜索
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    shops = shops.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.cityLabel.includes(q) ||
      s.district.toLowerCase().includes(q) ||
      s.tags.some(t => t.toLowerCase().includes(q))
    );
  }

  // 城市多选
  if (activeFilters.city.size > 0)
    shops = shops.filter(s => activeFilters.city.has(s.city));

  // 服务细化多选
  if (activeFilters.svc.size > 0) {
    const svcTagMap = {
      'men':          ['男士剪发','男士剃发'],
      'women':        ['女士剪发'],
      'kids':         ['儿童剪'],
      'barber':       ['男士剃发','剃发造型'],
      'single-color': ['单色染'],
      'highlight':    ['挑染'],
      'ear-dye':      ['挂耳染'],
      'balayage':     ['渐变色','Balayage'],
      'bleach':       ['漂白脱色'],
      'straight':     ['拉直'],
      'perm':         ['烫卷'],
      'digital-perm': ['数字烫'],
    };
    shops = shops.filter(s =>
      Array.from(activeFilters.svc).every(f => {
        const keywords = svcTagMap[f] || [f];
        return keywords.some(kw => s.tags.some(t => t.includes(kw)));
      })
    );
  }

  // 其他多选
  if (activeFilters.other.size > 0) {
    shops = shops.filter(s => {
      return Array.from(activeFilters.other).every(f => {
        if (f === 'chinese') return s.hasChinese;
        if (f === 'open')    return s.isOpen;
        if (f === 'high')    return s.rating >= 4.5;
        return true;
      });
    });
  }

  return shops;
}

// ============================================================
// 地图初始化
// ============================================================
function initMap() {
  leafletMap = L.map('leafletMap', { center: [45.0, 60.0], zoom: 3 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(leafletMap);
  SHOPS.forEach(shop => addMarker(shop));
}

function addMarker(shop) {
  const icon = L.divIcon({
    className: '',
    html: `<div class="map-marker" id="marker-${shop.id}"><span>✂️</span></div>`,
    iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -36]
  });
  const marker = L.marker([shop.lat, shop.lng], { icon }).addTo(leafletMap);
  marker.bindPopup(L.popup({ closeButton: false, maxWidth: 240 }).setContent(`
    <div class="popup-inner">
      <div class="popup-name">${shop.name}</div>
      <div class="popup-rating">⭐ ${shop.rating} · ${shop.reviewCount} 条评价 · ${shop.isOpen ? '🟢 营业中' : '🔴 已打烊'}</div>
      <div class="popup-addr">📍 ${shop.cityLabel} · ${shop.district}</div>
      <button class="popup-btn" onclick="openDetail(SHOPS.find(s=>s.id===${shop.id}))">查看评价 & 价目表</button>
    </div>
  `));
  marker.on('click', () => highlightCard(shop.id));
  markers[shop.id] = marker;
}

function highlightCard(id) {
  document.querySelectorAll('.shop-card').forEach(c =>
    c.classList.toggle('active', parseInt(c.dataset.id) === id)
  );
  const card = document.querySelector(`.shop-card[data-id="${id}"]`);
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ============================================================
// 渲染卡片
// ============================================================
function renderCards(shops) {
  const panel = document.getElementById('listPanel');
  panel.querySelectorAll('.shop-card, .no-result').forEach(c => c.remove());
  document.getElementById('resultCount').textContent = `找到 ${shops.length} 家理发店`;

  // 更新地图标记透明度
  SHOPS.forEach(s => {
    const el = document.getElementById(`marker-${s.id}`);
    if (el) el.style.opacity = shops.find(x => x.id === s.id) ? '1' : '0.2';
  });

  // 自动飞到合适视野
  if (leafletMap && shops.length > 0) {
    if (activeFilters.city.size === 1) {
      const cityKey = Array.from(activeFilters.city)[0];
      leafletMap.flyTo(CITY_CENTERS[cityKey], 13, { duration: 1 });
    } else if (shops.length !== SHOPS.length && shops.length > 0) {
      const bounds = L.latLngBounds(shops.map(s => [s.lat, s.lng]));
      leafletMap.flyToBounds(bounds.pad(0.2), { duration: 1 });
    } else {
      leafletMap.flyTo([45.0, 60.0], 3, { duration: 1 });
    }
  }

  if (shops.length === 0) {
    panel.insertAdjacentHTML('beforeend', `
      <div class="no-result">
        🔍 没有找到匹配的店铺<br/>
        <small>试试调整筛选条件</small>
      </div>`);
    return;
  }

  shops.forEach(shop => {
    const card = document.createElement('div');
    card.className = 'shop-card' + (currentShop?.id === shop.id ? ' active' : '');
    card.dataset.id = shop.id;
    card.onclick = () => {
      if (leafletMap) {
        leafletMap.flyTo([shop.lat, shop.lng], 15, { duration: 0.8 });
        markers[shop.id]?.openPopup();
      }
      highlightCard(shop.id);
      openDetail(shop);
    };
    card.innerHTML = `
      <div class="shop-card-header">
        <div class="shop-name">${shop.name}</div>
        <div class="shop-badge ${shop.isOpen ? 'badge-open' : 'badge-closed'}">${shop.isOpen ? '营业中' : '已打烊'}</div>
      </div>
      <div class="shop-rating">
        <span class="stars">${'★'.repeat(Math.floor(shop.rating))}${'☆'.repeat(5-Math.floor(shop.rating))}</span>
        <span class="rating-num">${shop.rating}</span>
        <span class="review-count">(${shop.reviewCount} 条)</span>
      </div>
      <div class="shop-info">
        <span>💰 均 €${shop.avgPrice}</span>
        <span>🕐 ${shop.isOpen ? '营业中' : '已打烊'}</span>
      </div>
      <div class="shop-tags">
        <span class="shop-tag-city">📍 ${shop.cityLabel}</span>
        ${shop.tags.map(t=>`<span class="shop-tag">${t}</span>`).join('')}
        ${shop.hasChinese ? '<span class="shop-tag shop-tag-cn">🇨🇳 中文</span>' : ''}
      </div>
    `;
    panel.appendChild(card);
  });
}

// ============================================================
// 搜索
// ============================================================
function doSearch() {
  currentSearch = document.getElementById('searchInput').value.trim();
  renderCards(getFiltered());
}
document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

// ============================================================
// 视图切换
// ============================================================
function switchView(view) {
  document.body.className = view + '-view';
  document.getElementById('btnMap').classList.toggle('active', view === 'map');
  document.getElementById('btnCard').classList.toggle('active', view === 'card');
  if (view === 'map' && leafletMap) setTimeout(() => leafletMap.invalidateSize(), 50);
}

// ============================================================
// 详情弹窗
// ============================================================
function openDetail(shop) {
  currentShop = shop;
  document.getElementById('dp-name').textContent = shop.name;
  const st = document.getElementById('dp-status');
  st.textContent = shop.isOpen ? '营业中' : '已打烊';
  st.className = 'dh-status ' + (shop.isOpen ? 'dh-open' : 'dh-closed');
  document.getElementById('dp-rating').textContent  = `⭐ ${shop.rating} (${shop.reviewCount} 条评价)`;
  document.getElementById('dp-address').textContent = `📍 ${shop.address}`;
  document.getElementById('dp-phone').textContent   = `📞 ${shop.phone}`;
  document.getElementById('dp-hours').textContent   = `🕐 ${shop.hours}`;

  document.getElementById('good-reviews').innerHTML = shop.goodReviews.map(r => reviewCard(r,'good')).join('');
  document.getElementById('bad-reviews').innerHTML  = shop.badReviews.map(r => reviewCard(r,'bad')).join('');
  document.getElementById('price-tbody').innerHTML  = shop.prices.map(p =>
    `<tr><td>${p.service}</td><td class="price">${p.price}</td><td class="price-note">${p.note}</td></tr>`
  ).join('');
  document.getElementById('info-grid').innerHTML = Object.entries(shop.info).map(([k,v]) =>
    `<div class="info-item"><div class="info-label">${k}</div><div class="info-value">${v}</div></div>`
  ).join('');

  switchTab('reviews');
  document.getElementById('detailOverlay').classList.add('show');
}

function reviewCard(r, type) {
  return `<div class="review-card ${type}">
    <div class="review-meta"><span class="reviewer">${r.author}</span><span class="review-date">${r.date}</span></div>
    <div class="review-stars">${'⭐'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
    <div class="review-text">${r.text}</div>
    <div class="review-source">${r.source==='Google'?'🔵':'🔴'} 来自 ${r.source}</div>
  </div>`;
}

function closeDetail(e) {
  if (!e || e.target === document.getElementById('detailOverlay'))
    document.getElementById('detailOverlay').classList.remove('show');
}

function switchTab(tab) {
  const tabs = ['reviews','userreviews','prices','info'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===tab));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id==='tab-'+tab));
  if (tab === 'userreviews' && currentShop) renderUserReviews(currentShop.id);
}

// ============================================================
// 启动
// ============================================================
window.addEventListener('load', () => {
  initMap();
  renderCards(getFiltered());
  loadUserReviews();
});
</script>
